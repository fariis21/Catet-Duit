<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>FinTrack — Catatan Keuangan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ── RESET & BASE ──────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F4FA;--surface:#FFFFFF;
  --header-top:#0F1F3D;--header-bot:#1A3563;
  --accent:#2563EB;--accent-soft:#DBEAFE;
  --green:#10B981;--green-soft:#D1FAE5;
  --red:#F43F5E;--red-soft:#FFE4E8;
  --gold:#F59E0B;--gold-soft:#FEF3C7;
  --text:#1E293B;--text-sub:#64748B;--text-muted:#94A3B8;
  --border:#E2E8F0;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --radius-sm:10px;--radius:16px;--radius-lg:24px;
  --ff:'Sora',sans-serif;--ff-mono:'JetBrains Mono',monospace;
  --tr:.22s cubic-bezier(.4,0,.2,1);
}
html{font-family:var(--ff);font-size:16px;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);min-height:100vh}
button{font-family:var(--ff);cursor:pointer;border:none;outline:none}
input,select{font-family:var(--ff);outline:none;border:none}

/* ── LAYOUT ─────────────────────────────────────────── */
.app-shell{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;position:relative}
@media(min-width:768px){
  body{padding:24px 16px}
  .app-shell{max-width:520px;border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.18)}
}
@media(min-width:1024px){
  body{display:flex;align-items:flex-start;justify-content:center;gap:32px;padding:32px}
  .app-shell{max-width:420px}
  .desktop-sidebar{display:flex!important;flex-direction:column;gap:20px;width:320px;position:sticky;top:32px}
}
.desktop-sidebar{display:none}
.sidebar-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-md)}
.sidebar-card h3{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-sub);margin-bottom:12px}

/* ── HEADER ─────────────────────────────────────────── */
.header{background:linear-gradient(155deg,var(--header-top) 0%,var(--header-bot) 100%);padding:20px 20px 80px;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(37,99,235,.18)}
.header::after{content:'';position:absolute;bottom:30px;left:-40px;width:130px;height:130px;border-radius:50%;background:rgba(16,185,129,.10)}
.header-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;position:relative;z-index:1}
.app-logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:34px;height:34px;background:var(--green);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
.app-name{font-size:1.05rem;font-weight:700;color:#fff;letter-spacing:-.01em}
.app-name span{color:var(--green)}
.header-actions{display:flex;gap:8px}
.header-btn{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;transition:background var(--tr)}
.header-btn:hover{background:rgba(255,255,255,.22)}
.header-btn.active-tab{background:rgba(255,255,255,.25);outline:2px solid rgba(255,255,255,.4)}
.balance-section{position:relative;z-index:1;text-align:center}
.balance-label{font-size:.78rem;font-weight:500;color:rgba(255,255,255,.6);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
.balance-amount{font-size:2.5rem;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.1;font-family:var(--ff-mono)}
.balance-amount.negative{color:var(--red)}
.balance-count{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:6px}

/* ── STAT CARDS ─────────────────────────────────────── */
.stats-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;margin-top:-44px;position:relative;z-index:2}
.stat-card{background:var(--surface);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow-md);display:flex;flex-direction:column;gap:8px;transition:transform var(--tr),box-shadow var(--tr)}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-top{display:flex;align-items:center;justify-content:space-between}
.stat-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-sub)}
.stat-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.stat-icon.green{background:var(--green-soft)}.stat-icon.red{background:var(--red-soft)}
.stat-value{font-size:1rem;font-weight:700;font-family:var(--ff-mono);letter-spacing:-.01em}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}

/* ── BOTTOM NAV ─────────────────────────────────────── */
.bottom-nav{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.nav-btn{flex:1;padding:10px 8px 12px;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;color:var(--text-muted);font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;transition:color var(--tr)}
.nav-btn .nav-icon{font-size:20px;transition:transform var(--tr)}
.nav-btn.active{color:var(--accent)}
.nav-btn.active .nav-icon{transform:scale(1.15)}
@media(min-width:1024px){.bottom-nav{display:none}}

/* ── PAGES ──────────────────────────────────────────── */
.page{display:none;flex:1;flex-direction:column}.page.active{display:flex}

/* ── MAIN CONTENT ───────────────────────────────────── */
.main-content{flex:1;padding:20px 16px 16px;display:flex;flex-direction:column;gap:20px}

/* ── SECTION HEADER ─────────────────────────────────── */
.section-header{display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:.88rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.section-badge{background:var(--accent);color:#fff;font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.04em}

/* ── FILTER PILLS ───────────────────────────────────── */
.filter-group{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-group::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;background:var(--surface);border:1.5px solid var(--border);color:var(--text-sub);font-size:.72rem;font-weight:600;padding:7px 14px;border-radius:99px;cursor:pointer;transition:all var(--tr);white-space:nowrap}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pill.green.active{background:var(--green);border-color:var(--green)}
.pill.red.active{background:var(--red);border-color:var(--red)}

/* ── TX CARDS ───────────────────────────────────────── */
.tx-list{display:flex;flex-direction:column;gap:10px}
.tx-card{background:var(--surface);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);border-left:4px solid transparent;transition:all var(--tr);animation:slideIn .3s cubic-bezier(.4,0,.2,1) both}
.tx-card:hover{box-shadow:var(--shadow-md);transform:translateX(2px)}
.tx-card.income{border-left-color:var(--green)}.tx-card.expense{border-left-color:var(--red)}
@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tx-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-icon.income{background:var(--green-soft)}.tx-icon.expense{background:var(--red-soft)}
.tx-body{flex:1;min-width:0}
.tx-name{font-size:.88rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.tx-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tx-cat{font-size:.64rem;font-weight:600;background:var(--bg);color:var(--text-sub);padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.04em}
.tx-date{font-size:.68rem;color:var(--text-muted)}
.tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.tx-amount{font-size:.9rem;font-weight:700;font-family:var(--ff-mono);letter-spacing:-.01em}
.tx-amount.income{color:var(--green)}.tx-amount.expense{color:var(--red)}
.tx-del-btn{width:26px;height:26px;border-radius:8px;background:var(--red-soft);color:var(--red);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.tx-del-btn:hover{background:var(--red);color:#fff;transform:scale(1.1)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.empty-state .emoji{font-size:3rem;margin-bottom:12px;display:block}
.empty-state p{font-size:.85rem;line-height:1.5}

/* ── FAB ────────────────────────────────────────────── */
.fab-wrap{position:fixed;bottom:80px;right:50%;transform:translateX(50%);z-index:100}
@media(min-width:768px){.fab-wrap{right:calc(50% - 260px);transform:none}}
@media(min-width:1024px){.fab-wrap{display:none}}
.fab{display:flex;align-items:center;gap:10px;background:var(--accent);color:#fff;font-size:.85rem;font-weight:700;padding:14px 26px;border-radius:99px;box-shadow:0 6px 24px rgba(37,99,235,.45);letter-spacing:.01em;transition:all var(--tr)}
.fab:hover{background:#1D4ED8;transform:scale(1.04)}
.fab:active{transform:scale(.97)}

/* ── MODAL ──────────────────────────────────────────── */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(15,31,61,.55);backdrop-filter:blur(4px);z-index:200;align-items:flex-end;justify-content:center}
@media(min-width:600px){.modal-backdrop{align-items:center}}
.modal-backdrop.open{display:flex;animation:bdIn .25s ease}
@keyframes bdIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--surface);width:100%;max-width:480px;border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:8px 20px 36px;animation:sheetUp .32s cubic-bezier(.4,0,.2,1);max-height:92vh;overflow-y:auto}
@media(min-width:600px){.modal-sheet{border-radius:var(--radius-lg);padding:28px}}
@keyframes sheetUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:8px auto 20px}
@media(min-width:600px){.modal-handle{display:none}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.modal-title{font-size:1.1rem;font-weight:700;color:var(--text)}
.modal-close{width:34px;height:34px;border-radius:50%;background:var(--bg);color:var(--text-sub);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
.modal-close:hover{background:var(--border);color:var(--text)}

/* ── FORM ───────────────────────────────────────────── */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-label{font-size:.74rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-sub)}
.form-input{background:var(--bg);border:1.5px solid transparent;border-radius:var(--radius-sm);padding:13px 14px;font-size:.88rem;font-weight:500;color:var(--text);width:100%;transition:border-color var(--tr),box-shadow var(--tr)}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.12);background:var(--surface)}
.form-input::placeholder{color:var(--text-muted)}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-btn{padding:12px;border-radius:var(--radius-sm);font-size:.82rem;font-weight:700;border:1.5px solid var(--border);background:var(--bg);color:var(--text-sub);display:flex;align-items:center;justify-content:center;gap:7px;transition:all var(--tr)}
.type-btn.active.income{background:var(--green-soft);border-color:var(--green);color:var(--green)}
.type-btn.active.expense{background:var(--red-soft);border-color:var(--red);color:var(--red)}
.btn-submit{width:100%;padding:15px;border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:.92rem;font-weight:700;letter-spacing:.01em;margin-top:8px;transition:all var(--tr);box-shadow:0 4px 14px rgba(37,99,235,.35)}
.btn-submit:hover{background:#1D4ED8;transform:translateY(-1px)}
.btn-submit:active{transform:translateY(0)}

/* ── SIDEBAR FORM ───────────────────────────────────── */
.sidebar-form .form-group{margin-bottom:12px}
.sidebar-form .btn-submit{margin-top:4px}

/* ╔══════════════════════════════════════════╗ */
/* ║         REPORT PAGE STYLES              ║ */
/* ╚══════════════════════════════════════════╝ */

/* ── REPORT HEADER ──────────────────────────────────── */
.report-header{background:linear-gradient(155deg,var(--header-top) 0%,var(--header-bot) 100%);padding:20px 20px 24px;position:relative;overflow:hidden}
.report-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(245,158,11,.15)}
.report-header::after{content:'';position:absolute;bottom:-30px;left:-30px;width:120px;height:120px;border-radius:50%;background:rgba(37,99,235,.12)}
.report-top-row{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.report-page-title{font-size:1.05rem;font-weight:700;color:#fff}
.month-nav{display:flex;align-items:center;gap:8px;position:relative;z-index:1;margin-top:18px}
.month-nav-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background var(--tr);flex-shrink:0}
.month-nav-btn:hover{background:rgba(255,255,255,.28)}
.month-display{flex:1;text-align:center}
.month-display-text{font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:-.01em}
.month-display-sub{font-size:.72rem;color:rgba(255,255,255,.55);margin-top:2px}

/* ── REPORT SUMMARY GRID ────────────────────────────── */
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;margin-top:-10px}
.report-stat{background:var(--surface);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-md)}
.report-stat-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-sub);margin-bottom:6px}
.report-stat-val{font-size:.92rem;font-weight:700;font-family:var(--ff-mono)}
.report-stat-val.green{color:var(--green)}.report-stat-val.red{color:var(--red)}.report-stat-val.blue{color:var(--accent)}.report-stat-val.gold{color:var(--gold)}
.report-stat-delta{font-size:.68rem;font-weight:600;margin-top:4px;display:flex;align-items:center;gap:3px}
.report-stat-delta.up{color:var(--green)}.report-stat-delta.down{color:var(--red)}.report-stat-delta.neutral{color:var(--text-muted)}

/* ── REPORT CONTENT ─────────────────────────────────── */
.report-content{flex:1;padding:16px 16px 16px;display:flex;flex-direction:column;gap:18px;overflow-y:auto}

/* ── REPORT CARD ────────────────────────────────────── */
.rcard{background:var(--surface);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm)}
.rcard-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.rcard-title{font-size:.82rem;font-weight:700;color:var(--text);letter-spacing:-.01em}
.rcard-badge{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:99px;letter-spacing:.03em}
.badge-green{background:var(--green-soft);color:var(--green)}
.badge-red{background:var(--red-soft);color:var(--red)}
.badge-gold{background:var(--gold-soft);color:var(--gold)}
.badge-blue{background:var(--accent-soft);color:var(--accent)}

/* ── SAVINGS RING ───────────────────────────────────── */
.savings-block{display:flex;align-items:center;gap:20px}
.ring-wrap{position:relative;width:88px;height:88px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--bg);stroke-width:10}
.ring-fill{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s cubic-bezier(.4,0,.2,1)}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:1.1rem;font-weight:700;font-family:var(--ff-mono);line-height:1}
.ring-sub{font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-top:2px}
.savings-info{flex:1}
.savings-title{font-size:.88rem;font-weight:700;color:var(--text);margin-bottom:6px}
.savings-desc{font-size:.76rem;color:var(--text-sub);line-height:1.5}
.savings-amount{font-size:1rem;font-weight:700;font-family:var(--ff-mono);margin-top:6px}

/* ── BAR CHART ──────────────────────────────────────── */
.chart-wrap{overflow-x:auto;scrollbar-width:none}
.chart-wrap::-webkit-scrollbar{display:none}
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:120px;min-width:100%;padding-bottom:0}
.bar-group{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;min-width:44px}
.bar-pair{display:flex;align-items:flex-end;gap:3px;height:90px;width:100%}
.bar{border-radius:6px 6px 0 0;width:100%;min-height:3px;transition:height .6s cubic-bezier(.4,0,.2,1);cursor:pointer;position:relative}
.bar.income-bar{background:var(--green)}
.bar.expense-bar{background:var(--red)}
.bar:hover::after{content:attr(data-tip);position:absolute;top:-28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:.6rem;padding:3px 7px;border-radius:6px;white-space:nowrap;font-family:var(--ff-mono);z-index:10}
.bar-month-label{font-size:.65rem;font-weight:600;color:var(--text-muted);text-align:center;white-space:nowrap}
.bar-month-label.current{color:var(--accent);font-weight:700}
.chart-legend{display:flex;gap:16px;margin-bottom:12px}
.legend-dot{width:10px;height:10px;border-radius:3px}
.legend-dot.green{background:var(--green)}.legend-dot.red{background:var(--red)}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.72rem;font-weight:600;color:var(--text-sub)}

/* ── CATEGORY BREAKDOWN ─────────────────────────────── */
.cat-row{display:flex;flex-direction:column;gap:10px}
.cat-item{display:flex;flex-direction:column;gap:5px}
.cat-item-top{display:flex;align-items:center;justify-content:space-between}
.cat-item-left{display:flex;align-items:center;gap:8px}
.cat-emoji-badge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cat-name{font-size:.8rem;font-weight:600;color:var(--text)}
.cat-count{font-size:.68rem;color:var(--text-muted)}
.cat-item-right{text-align:right}
.cat-amount{font-size:.82rem;font-weight:700;font-family:var(--ff-mono)}
.cat-pct-label{font-size:.65rem;color:var(--text-muted)}
.cat-bar-track{height:5px;background:var(--bg);border-radius:99px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1)}

/* ── TOP TXS ────────────────────────────────────────── */
.top-tx{display:flex;flex-direction:column;gap:8px}
.top-tx-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm)}
.top-tx-rank{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:.68rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.top-tx-rank.gold{background:var(--gold)}
.top-tx-body{flex:1;min-width:0}
.top-tx-name{font-size:.8rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-tx-cat{font-size:.65rem;color:var(--text-muted)}
.top-tx-amt{font-size:.82rem;font-weight:700;font-family:var(--ff-mono);flex-shrink:0}
.top-tx-amt.expense{color:var(--red)}.top-tx-amt.income{color:var(--green)}

/* ── MOM TABLE ──────────────────────────────────────── */
.mom-row{display:flex;flex-direction:column;gap:6px}
.mom-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm)}
.mom-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.mom-dot.green{background:var(--green)}.mom-dot.red{background:var(--red)}.mom-dot.blue{background:var(--accent)}
.mom-label{flex:1;font-size:.8rem;font-weight:500;color:var(--text-sub)}
.mom-value{font-size:.82rem;font-weight:700;font-family:var(--ff-mono)}
.mom-delta{font-size:.7rem;font-weight:600;margin-left:6px}
.mom-delta.up{color:var(--green)}.mom-delta.down{color:var(--red)}.mom-delta.neutral{color:var(--text-muted)}

/* ── NO DATA REPORT ─────────────────────────────────── */
.no-report{text-align:center;padding:32px 20px;color:var(--text-muted)}
.no-report .emoji{font-size:2.5rem;display:block;margin-bottom:10px}
.no-report p{font-size:.83rem;line-height:1.5}

/* ── TOAST ──────────────────────────────────────────── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--text);color:#fff;padding:11px 20px;border-radius:99px;font-size:.82rem;font-weight:600;z-index:300;transition:transform .35s cubic-bezier(.4,0,.2,1);white-space:nowrap;box-shadow:var(--shadow-md)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{background:var(--green)}.toast.error{background:var(--red)}

/* ── CAT COLOR CLASSES ──────────────────────────────── */
.cat-makanan{background:#FEF9C3;color:#854D0E}.cat-transport{background:#DBEAFE;color:#1E40AF}
.cat-belanja{background:#FAE8FF;color:#701A75}.cat-hiburan{background:#FFE4E8;color:#9F1239}
.cat-tagihan{background:#FEE2E2;color:#991B1B}.cat-gaji{background:#D1FAE5;color:#065F46}
.cat-bisnis{background:#CFFAFE;color:#164E63}.cat-investasi{background:#EDE9FE;color:#4C1D95}
.cat-lainnya{background:#F1F5F9;color:#475569}.cat-freelance{background:#FEF3C7;color:#92400E}
.cat-hadiah{background:#FCE7F3;color:#831843}.cat-kesehatan{background:#DCFCE7;color:#166534}
.cat-pendidikan{background:#E0F2FE;color:#075985}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
</style>
</head>
<body>

<!-- DESKTOP SIDEBAR -->
<div class="desktop-sidebar" id="desktopSidebar">
  <div class="sidebar-card">
    <h3>Tambah Transaksi</h3>
    <form class="sidebar-form" id="sidebarForm">
      <div class="form-group">
        <label class="form-label">Jenis</label>
        <div class="type-toggle">
          <button type="button" class="type-btn income active" data-type="income">💰 Pemasukan</button>
          <button type="button" class="type-btn expense" data-type="expense">💸 Pengeluaran</button>
        </div>
        <input type="hidden" id="sidebarType" value="income"/>
      </div>
      <div class="form-group"><label class="form-label" for="sidebarName">Nama Transaksi</label><input class="form-input" id="sidebarName" type="text" placeholder="cth. Gaji Bulan Ini" required/></div>
      <div class="form-group"><label class="form-label" for="sidebarAmount">Jumlah (Rp)</label><input class="form-input" id="sidebarAmount" type="number" placeholder="0" min="1" required/></div>
      <div class="form-group"><label class="form-label" for="sidebarCat">Kategori</label><select class="form-input" id="sidebarCat"></select></div>
      <div class="form-group"><label class="form-label" for="sidebarDate">Tanggal</label><input class="form-input" id="sidebarDate" type="date" required/></div>
      <button type="submit" class="btn-submit">+ Tambah Transaksi</button>
    </form>
  </div>
  <div class="sidebar-card"><h3>Tips Keuangan 💡</h3><p style="font-size:.8rem;color:var(--text-sub);line-height:1.6">Catat setiap pengeluaran, sekecil apapun. Kebiasaan kecil membentuk kebiasaan finansial yang sehat.</p></div>
</div>

<!-- APP SHELL -->
<div class="app-shell">

  <!-- ═══ PAGE: DASHBOARD ═══ -->
  <div class="page active" id="pageDashboard">
    <div class="header">
      <div class="header-top-row">
        <div class="app-logo">
          <div class="logo-icon">💳</div>
          <div class="app-name">Fin<span>Track</span></div>
        </div>
        <div class="header-actions">
          <button class="header-btn" onclick="renderAll()">↻</button>
        </div>
      </div>
      <div class="balance-section">
        <div class="balance-label">Saldo Total</div>
        <div class="balance-amount" id="balanceDisplay">Rp0</div>
        <div class="balance-count" id="txCount">0 transaksi tercatat</div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-top"><div class="stat-label">Pemasukan</div><div class="stat-icon green">📈</div></div>
        <div class="stat-value green" id="totalIncome">Rp0</div>
      </div>
      <div class="stat-card">
        <div class="stat-top"><div class="stat-label">Pengeluaran</div><div class="stat-icon red">📉</div></div>
        <div class="stat-value red" id="totalExpense">Rp0</div>
      </div>
    </div>
    <div class="main-content">
      <div>
        <div class="section-header" style="margin-bottom:12px">
          <div class="section-title">Riwayat Transaksi</div>
          <div class="section-badge" id="filteredCount">0</div>
        </div>
        <div class="filter-group" id="typeFilters">
          <button class="pill active" data-filter-type="all">Semua</button>
          <button class="pill green" data-filter-type="income">Pemasukan</button>
          <button class="pill red" data-filter-type="expense">Pengeluaran</button>
        </div>
        <div class="filter-group" style="margin-top:8px" id="catFilters">
          <button class="pill active" data-filter-cat="all">Semua Kategori</button>
        </div>
      </div>
      <div class="tx-list" id="txList"></div>
    </div>
    <div class="fab-wrap">
      <button class="fab" id="fabBtn"><span style="font-size:18px">＋</span> Transaksi Baru</button>
    </div>
  </div><!-- /pageDashboard -->

  <!-- ═══ PAGE: REPORT ═══ -->
  <div class="page" id="pageReport">
    <div class="report-header">
      <div class="report-top-row">
        <div class="app-logo">
          <div class="logo-icon">💳</div>
          <div class="app-name">Fin<span>Track</span></div>
        </div>
        <div style="color:rgba(255,255,255,.7);font-size:.78rem;font-weight:600;letter-spacing:.04em">LAPORAN BULANAN</div>
      </div>
      <div class="month-nav">
        <button class="month-nav-btn" id="prevMonthBtn">‹</button>
        <div class="month-display">
          <div class="month-display-text" id="reportMonthLabel">—</div>
          <div class="month-display-sub" id="reportMonthSub">—</div>
        </div>
        <button class="month-nav-btn" id="nextMonthBtn">›</button>
      </div>
    </div>

    <!-- Summary mini-grid -->
    <div class="report-grid" id="reportGrid"></div>

    <div class="report-content" id="reportContent"></div>
  </div><!-- /pageReport -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="navDashboard" onclick="switchPage('dashboard')">
      <span class="nav-icon">🏠</span>Beranda
    </button>
    <button class="nav-btn" id="navReport" onclick="switchPage('report')">
      <span class="nav-icon">📊</span>Laporan
    </button>
    <button class="nav-btn" onclick="openModal()">
      <span class="nav-icon">＋</span>Tambah
    </button>
  </nav>
</div><!-- /app-shell -->

<!-- ADD TRANSACTION MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Tambah Transaksi</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <form id="txForm">
      <div class="form-group">
        <label class="form-label">Jenis Transaksi</label>
        <div class="type-toggle">
          <button type="button" class="type-btn income active" data-type="income">💰 Pemasukan</button>
          <button type="button" class="type-btn expense" data-type="expense">💸 Pengeluaran</button>
        </div>
        <input type="hidden" id="formType" value="income"/>
      </div>
      <div class="form-group"><label class="form-label" for="formName">Nama Transaksi</label><input class="form-input" id="formName" type="text" placeholder="cth. Gaji Bulan Ini" required/></div>
      <div class="form-group"><label class="form-label" for="formAmount">Jumlah (Rp)</label><input class="form-input" id="formAmount" type="number" placeholder="0" min="1" required/></div>
      <div class="form-group"><label class="form-label" for="formCat">Kategori</label><select class="form-input" id="formCat"></select></div>
      <div class="form-group"><label class="form-label" for="formDate">Tanggal</label><input class="form-input" id="formDate" type="date" required/></div>
      <button type="submit" class="btn-submit">✓ Simpan Transaksi</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const STORAGE_KEY = 'fintrack_v2';
const MONTHS_ID   = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const CATEGORIES  = {
  income:  ['Gaji','Freelance','Bisnis','Investasi','Hadiah','Lainnya'],
  expense: ['Makanan','Transport','Belanja','Hiburan','Tagihan','Kesehatan','Pendidikan','Lainnya'],
};
const CAT_EMOJI = {
  Gaji:'💼',Freelance:'💻',Bisnis:'🏪',Investasi:'📊',Hadiah:'🎁',
  Makanan:'🍜',Transport:'🚗',Belanja:'🛍️',Hiburan:'🎮',Tagihan:'📄',
  Kesehatan:'💊',Pendidikan:'📚',Lainnya:'📦',
};
const CAT_CLASS = {
  Makanan:'cat-makanan',Transport:'cat-transport',Belanja:'cat-belanja',
  Hiburan:'cat-hiburan',Tagihan:'cat-tagihan',Gaji:'cat-gaji',Bisnis:'cat-bisnis',
  Investasi:'cat-investasi',Lainnya:'cat-lainnya',Freelance:'cat-freelance',
  Hadiah:'cat-hadiah',Kesehatan:'cat-kesehatan',Pendidikan:'cat-pendidikan',
};
const CAT_COLORS = {
  Makanan:'#F59E0B',Transport:'#3B82F6',Belanja:'#A855F7',Hiburan:'#F43F5E',
  Tagihan:'#EF4444',Gaji:'#10B981',Bisnis:'#06B6D4',Investasi:'#8B5CF6',
  Lainnya:'#94A3B8',Freelance:'#F59E0B',Hadiah:'#EC4899',Kesehatan:'#22C55E',Pendidikan:'#0EA5E9',
};

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let transactions = [];
let filterType   = 'all';
let filterCat    = 'all';
let currentPage  = 'dashboard';

// Report state: current viewed month/year
let reportYear, reportMonth; // 0-based month

// ═══════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════
function load(){ try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch{return [];} }
function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify(transactions)); }

// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════
function rupiah(n){ return 'Rp'+Math.abs(n).toLocaleString('id-ID'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function formatDate(iso){
  if(!iso) return '-';
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
}
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function pct(a,b){ return b===0?0:Math.round(a/b*100); }

function deltaLabel(curr, prev){
  if(prev===0 && curr===0) return {cls:'neutral',txt:'—'};
  if(prev===0) return {cls:'up',txt:'Baru'};
  const d=((curr-prev)/prev*100);
  const abs=Math.abs(d).toFixed(1);
  return d>=0 ? {cls:'up',txt:`▲ ${abs}%`} : {cls:'down',txt:`▼ ${abs}%`};
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='toast',2800);
}

// ═══════════════════════════════════════════════════
//  PAGE SWITCHING
// ═══════════════════════════════════════════════════
function switchPage(page){
  currentPage=page;
  document.getElementById('pageDashboard').classList.toggle('active',page==='dashboard');
  document.getElementById('pageReport').classList.toggle('active',page==='report');
  document.getElementById('navDashboard').classList.toggle('active',page==='dashboard');
  document.getElementById('navReport').classList.toggle('active',page==='report');
  if(page==='report') renderReport();
}

// ═══════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════
function openModal(){
  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('txForm').reset();
  setActiveType('income',document.getElementById('txForm'));
  document.getElementById('formType').value='income';
}
document.getElementById('fabBtn').addEventListener('click',openModal);
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalBackdrop').addEventListener('click',e=>{
  if(e.target===document.getElementById('modalBackdrop')) closeModal();
});

// ═══════════════════════════════════════════════════
//  TYPE TOGGLE
// ═══════════════════════════════════════════════════
function setActiveType(type,formEl){
  formEl.querySelectorAll('.type-btn').forEach(btn=>btn.classList.toggle('active',btn.dataset.type===type));
  const hiddenId=formEl.querySelector('input[type="hidden"]').id;
  document.getElementById(hiddenId).value=type;
  const catId=hiddenId==='formType'?'formCat':'sidebarCat';
  populateCatSelect(catId,type);
}
function populateCatSelect(id,type){
  const sel=document.getElementById(id); sel.innerHTML='';
  CATEGORIES[type].forEach(c=>{
    const opt=document.createElement('option');
    opt.value=c; opt.textContent=(CAT_EMOJI[c]||'📦')+'  '+c;
    sel.appendChild(opt);
  });
}
document.querySelectorAll('#txForm .type-btn').forEach(btn=>btn.addEventListener('click',()=>setActiveType(btn.dataset.type,document.getElementById('txForm'))));
document.querySelectorAll('#sidebarForm .type-btn').forEach(btn=>btn.addEventListener('click',()=>setActiveType(btn.dataset.type,document.getElementById('sidebarForm'))));

// ═══════════════════════════════════════════════════
//  ADD TRANSACTION
// ═══════════════════════════════════════════════════
function addTransaction(data){
  const tx={id:uid(),name:data.name.trim(),type:data.type,amount:parseFloat(data.amount),category:data.category,date:data.date,created:Date.now()};
  transactions.unshift(tx); save(); renderAll();
  showToast(tx.type==='income'?'💰 Pemasukan ditambahkan!':'💸 Pengeluaran dicatat!');
}
document.getElementById('txForm').addEventListener('submit',e=>{
  e.preventDefault();
  addTransaction({name:document.getElementById('formName').value,type:document.getElementById('formType').value,amount:document.getElementById('formAmount').value,category:document.getElementById('formCat').value,date:document.getElementById('formDate').value});
  closeModal();
});
document.getElementById('sidebarForm').addEventListener('submit',e=>{
  e.preventDefault();
  addTransaction({name:document.getElementById('sidebarName').value,type:document.getElementById('sidebarType').value,amount:document.getElementById('sidebarAmount').value,category:document.getElementById('sidebarCat').value,date:document.getElementById('sidebarDate').value});
  e.target.reset(); setActiveType('income',document.getElementById('sidebarForm'));
});

// ═══════════════════════════════════════════════════
//  DELETE
// ═══════════════════════════════════════════════════
function deleteTransaction(id){
  transactions=transactions.filter(t=>t.id!==id); save(); renderAll();
  showToast('🗑 Transaksi dihapus','error');
}

// ═══════════════════════════════════════════════════
//  DASHBOARD FILTERS
// ═══════════════════════════════════════════════════
document.getElementById('typeFilters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-filter-type]'); if(!btn) return;
  filterType=btn.dataset.filterType; filterCat='all';
  document.querySelectorAll('[data-filter-type]').forEach(b=>b.classList.toggle('active',b===btn));
  renderFilters(); renderTxList();
});
document.getElementById('catFilters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-filter-cat]'); if(!btn) return;
  filterCat=btn.dataset.filterCat;
  document.querySelectorAll('[data-filter-cat]').forEach(b=>b.classList.toggle('active',b===btn));
  renderTxList();
});

function renderFilters(){
  const visible=filterType==='all'?transactions:transactions.filter(t=>t.type===filterType);
  const cats=['all',...new Set(visible.map(t=>t.category))];
  const bar=document.getElementById('catFilters'); bar.innerHTML='';
  cats.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='pill'+(c===filterCat?' active':'');
    btn.dataset.filterCat=c;
    btn.textContent=c==='all'?'Semua Kategori':(CAT_EMOJI[c]||'📦')+' '+c;
    bar.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════
//  DASHBOARD STATS
// ═══════════════════════════════════════════════════
function renderStats(){
  const income=transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance=income-expense;
  const bd=document.getElementById('balanceDisplay');
  bd.textContent=rupiah(balance);
  bd.className='balance-amount '+(balance<0?'negative':'positive');
  document.getElementById('totalIncome').textContent=rupiah(income);
  document.getElementById('totalExpense').textContent=rupiah(expense);
  document.getElementById('txCount').textContent=`${transactions.length} transaksi tercatat`;
}

// ═══════════════════════════════════════════════════
//  DASHBOARD TX LIST
// ═══════════════════════════════════════════════════
function renderTxList(){
  let filtered=transactions;
  if(filterType!=='all') filtered=filtered.filter(t=>t.type===filterType);
  if(filterCat!=='all')  filtered=filtered.filter(t=>t.category===filterCat);
  document.getElementById('filteredCount').textContent=filtered.length;
  const list=document.getElementById('txList');
  if(filtered.length===0){
    list.innerHTML=`<div class="empty-state"><span class="emoji">📭</span><p>Belum ada transaksi.<br>Tekan <strong>+ Transaksi Baru</strong> untuk mulai mencatat.</p></div>`;
    return;
  }
  list.innerHTML=filtered.map(tx=>`
    <div class="tx-card ${tx.type}" style="animation-delay:${Math.random()*.08}s">
      <div class="tx-icon ${tx.type}">${CAT_EMOJI[tx.category]||'📦'}</div>
      <div class="tx-body">
        <div class="tx-name">${escHtml(tx.name)}</div>
        <div class="tx-meta">
          <span class="tx-cat ${CAT_CLASS[tx.category]||'cat-lainnya'}">${tx.category}</span>
          <span class="tx-date">${formatDate(tx.date)}</span>
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amount ${tx.type}">${tx.type==='income'?'+':'-'}${rupiah(tx.amount)}</div>
        <button class="tx-del-btn" onclick="deleteTransaction('${tx.id}')" title="Hapus">✕</button>
      </div>
    </div>`).join('');
}

// ═══════════════════════════════════════════════════
//  REPORT: MONTH NAVIGATION
// ═══════════════════════════════════════════════════
document.getElementById('prevMonthBtn').addEventListener('click',()=>{
  reportMonth--; if(reportMonth<0){reportMonth=11;reportYear--;}
  renderReport();
});
document.getElementById('nextMonthBtn').addEventListener('click',()=>{
  reportMonth++; if(reportMonth>11){reportMonth=0;reportYear++;}
  renderReport();
});

// ═══════════════════════════════════════════════════
//  REPORT: MAIN RENDER
// ═══════════════════════════════════════════════════
function getMonthTx(y,m){
  return transactions.filter(t=>{
    if(!t.date) return false;
    const d=new Date(t.date+'T00:00:00');
    return d.getFullYear()===y && d.getMonth()===m;
  });
}
function monthSummary(txs){
  const income=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  return {income,expense,balance:income-expense,count:txs.length};
}

function renderReport(){
  // Labels
  document.getElementById('reportMonthLabel').textContent=MONTHS_ID[reportMonth]+' '+reportYear;
  document.getElementById('reportMonthSub').textContent=`Laporan keuangan bulanan`;

  const txs=getMonthTx(reportYear,reportMonth);
  const cur=monthSummary(txs);

  // Previous month
  let pm=reportMonth-1,py=reportYear;
  if(pm<0){pm=11;py--;}
  const prevTxs=getMonthTx(py,pm);
  const prev=monthSummary(prevTxs);

  // ── Summary Grid ──
  const dIncome=deltaLabel(cur.income,prev.income);
  const dExpense=deltaLabel(cur.expense,prev.expense);
  const savingsRate=cur.income>0?Math.round((cur.income-cur.expense)/cur.income*100):0;

  document.getElementById('reportGrid').innerHTML=`
    <div class="report-stat">
      <div class="report-stat-label">Pemasukan</div>
      <div class="report-stat-val green">${rupiah(cur.income)}</div>
      <div class="report-stat-delta ${dIncome.cls}">${dIncome.txt} <span style="color:var(--text-muted);font-weight:400">vs bln lalu</span></div>
    </div>
    <div class="report-stat">
      <div class="report-stat-label">Pengeluaran</div>
      <div class="report-stat-val red">${rupiah(cur.expense)}</div>
      <div class="report-stat-delta ${dExpense.cls}">${dExpense.txt} <span style="color:var(--text-muted);font-weight:400">vs bln lalu</span></div>
    </div>
    <div class="report-stat">
      <div class="report-stat-label">Saldo Bersih</div>
      <div class="report-stat-val ${cur.balance>=0?'blue':'red'}">${cur.balance>=0?'+':''}${rupiah(cur.balance)}</div>
      <div class="report-stat-delta neutral">${cur.count} transaksi</div>
    </div>
    <div class="report-stat">
      <div class="report-stat-label">Tabungan</div>
      <div class="report-stat-val gold">${savingsRate}%</div>
      <div class="report-stat-delta neutral">dari pemasukan</div>
    </div>`;

  if(txs.length===0){
    document.getElementById('reportContent').innerHTML=`
      <div class="no-report"><span class="emoji">📅</span><p>Tidak ada transaksi pada<br><strong>${MONTHS_ID[reportMonth]} ${reportYear}</strong>.<br>Coba pilih bulan lain.</p></div>`;
    return;
  }

  // ── Build content ──
  let html='';

  // 1. SAVINGS RING
  const ringR=35; const ringCirc=2*Math.PI*ringR;
  const clampedRate=Math.max(0,Math.min(100,savingsRate));
  const ringOffset=ringCirc-(clampedRate/100)*ringCirc;
  const ringColor=savingsRate>=50?'var(--green)':savingsRate>=20?'var(--gold)':'var(--red)';
  const savingsAmt=Math.max(0,cur.income-cur.expense);
  const savingsMsg=savingsRate>=50?'Luar biasa! Tabunganmu sangat baik bulan ini.':savingsRate>=20?'Cukup baik! Coba tingkatkan lagi bulan depan.':savingsRate>0?'Perlu ditingkatkan. Kurangi pengeluaran tidak perlu.':'Pengeluaran melebihi pemasukan bulan ini.';
  html+=`
  <div class="rcard">
    <div class="rcard-header">
      <div class="rcard-title">💰 Tingkat Tabungan</div>
      <span class="rcard-badge ${savingsRate>=50?'badge-green':savingsRate>=20?'badge-gold':'badge-red'}">${savingsRate>=50?'Sangat Baik':savingsRate>=20?'Cukup Baik':'Perlu Ditingkatkan'}</span>
    </div>
    <div class="savings-block">
      <div class="ring-wrap">
        <svg width="88" height="88" viewBox="0 0 88 88">
          <circle class="ring-bg" cx="44" cy="44" r="${ringR}"/>
          <circle class="ring-fill" cx="44" cy="44" r="${ringR}" stroke="${ringColor}"
            stroke-dasharray="${ringCirc}" stroke-dashoffset="${ringOffset}"/>
        </svg>
        <div class="ring-label">
          <div class="ring-pct" style="color:${ringColor}">${clampedRate}%</div>
          <div class="ring-sub">Saving</div>
        </div>
      </div>
      <div class="savings-info">
        <div class="savings-title">Hemat ${MONTHS_ID[reportMonth]}</div>
        <div class="savings-desc">${savingsMsg}</div>
        <div class="savings-amount" style="color:${ringColor}">${rupiah(savingsAmt)}</div>
      </div>
    </div>
  </div>`;

  // 2. 6-MONTH BAR CHART
  const chartMonths=[];
  for(let i=5;i>=0;i--){
    let m=reportMonth-i, y=reportYear;
    if(m<0){m+=12;y--;}
    const mtxs=getMonthTx(y,m);
    const s=monthSummary(mtxs);
    chartMonths.push({label:MONTHS_ID[m].slice(0,3),year:y,month:m,income:s.income,expense:s.expense,isCurrent:m===reportMonth&&y===reportYear});
  }
  const maxVal=Math.max(...chartMonths.map(c=>Math.max(c.income,c.expense)),1);
  const barHtml=chartMonths.map(c=>{
    const ih=Math.round((c.income/maxVal)*80);
    const eh=Math.round((c.expense/maxVal)*80);
    return `<div class="bar-group">
      <div class="bar-pair">
        <div class="bar income-bar" style="height:${ih}px" data-tip="${rupiah(c.income)}"></div>
        <div class="bar expense-bar" style="height:${eh}px" data-tip="${rupiah(c.expense)}"></div>
      </div>
      <div class="bar-month-label${c.isCurrent?' current':''}">${c.label}</div>
    </div>`;
  }).join('');
  html+=`
  <div class="rcard">
    <div class="rcard-header"><div class="rcard-title">📊 Tren 6 Bulan Terakhir</div></div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot green"></div>Pemasukan</div>
      <div class="legend-item"><div class="legend-dot red"></div>Pengeluaran</div>
    </div>
    <div class="chart-wrap"><div class="bar-chart">${barHtml}</div></div>
  </div>`;

  // 3. EXPENSE CATEGORY BREAKDOWN
  const expTxs=txs.filter(t=>t.type==='expense');
  if(expTxs.length>0){
    const catMap={};
    expTxs.forEach(t=>{ catMap[t.category]=(catMap[t.category]||0)+t.amount; });
    const sortedCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
    const totalExp=expTxs.reduce((s,t)=>s+t.amount,0);
    const catRowsHtml=sortedCats.map(([cat,amt])=>{
      const p=pct(amt,totalExp);
      const color=CAT_COLORS[cat]||'#94A3B8';
      const count=expTxs.filter(t=>t.category===cat).length;
      return `<div class="cat-item">
        <div class="cat-item-top">
          <div class="cat-item-left">
            <div class="cat-emoji-badge ${CAT_CLASS[cat]||'cat-lainnya'}">${CAT_EMOJI[cat]||'📦'}</div>
            <div>
              <div class="cat-name">${cat}</div>
              <div class="cat-count">${count} transaksi</div>
            </div>
          </div>
          <div class="cat-item-right">
            <div class="cat-amount" style="color:${color}">${rupiah(amt)}</div>
            <div class="cat-pct-label">${p}%</div>
          </div>
        </div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${p}%;background:${color}"></div></div>
      </div>`;
    }).join('');
    html+=`
    <div class="rcard">
      <div class="rcard-header">
        <div class="rcard-title">🗂 Pengeluaran per Kategori</div>
        <span class="rcard-badge badge-red">${sortedCats.length} kategori</span>
      </div>
      <div class="cat-row">${catRowsHtml}</div>
    </div>`;
  }

  // 4. INCOME CATEGORY BREAKDOWN
  const incTxs=txs.filter(t=>t.type==='income');
  if(incTxs.length>0){
    const catMap={};
    incTxs.forEach(t=>{ catMap[t.category]=(catMap[t.category]||0)+t.amount; });
    const sortedCats=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
    const totalInc=incTxs.reduce((s,t)=>s+t.amount,0);
    const catRowsHtml=sortedCats.map(([cat,amt])=>{
      const p=pct(amt,totalInc);
      const color=CAT_COLORS[cat]||'#10B981';
      const count=incTxs.filter(t=>t.category===cat).length;
      return `<div class="cat-item">
        <div class="cat-item-top">
          <div class="cat-item-left">
            <div class="cat-emoji-badge ${CAT_CLASS[cat]||'cat-lainnya'}">${CAT_EMOJI[cat]||'📦'}</div>
            <div><div class="cat-name">${cat}</div><div class="cat-count">${count} transaksi</div></div>
          </div>
          <div class="cat-item-right">
            <div class="cat-amount" style="color:${color}">${rupiah(amt)}</div>
            <div class="cat-pct-label">${p}%</div>
          </div>
        </div>
        <div class="cat-bar-track"><div class="cat-bar-fill" style="width:${p}%;background:${color}"></div></div>
      </div>`;
    }).join('');
    html+=`
    <div class="rcard">
      <div class="rcard-header">
        <div class="rcard-title">💹 Pemasukan per Sumber</div>
        <span class="rcard-badge badge-green">${sortedCats.length} sumber</span>
      </div>
      <div class="cat-row">${catRowsHtml}</div>
    </div>`;
  }

  // 5. TOP 5 EXPENSES
  const topExp=[...expTxs].sort((a,b)=>b.amount-a.amount).slice(0,5);
  if(topExp.length>0){
    const topHtml=topExp.map((t,i)=>`
      <div class="top-tx-item">
        <div class="top-tx-rank ${i===0?'gold':''}">${i+1}</div>
        <div class="top-tx-body">
          <div class="top-tx-name">${escHtml(t.name)}</div>
          <div class="top-tx-cat">${CAT_EMOJI[t.category]||'📦'} ${t.category} · ${formatDate(t.date)}</div>
        </div>
        <div class="top-tx-amt expense">-${rupiah(t.amount)}</div>
      </div>`).join('');
    html+=`
    <div class="rcard">
      <div class="rcard-header">
        <div class="rcard-title">🔥 Pengeluaran Terbesar</div>
        <span class="rcard-badge badge-red">Top ${topExp.length}</span>
      </div>
      <div class="top-tx">${topHtml}</div>
    </div>`;
  }

  // 6. MONTH-OVER-MONTH COMPARISON
  const momIncome=deltaLabel(cur.income,prev.income);
  const momExpense=deltaLabel(cur.expense,prev.expense);
  const momBalance=deltaLabel(cur.balance,prev.balance);
  const momCount=deltaLabel(cur.count,prev.count);
  html+=`
  <div class="rcard">
    <div class="rcard-header">
      <div class="rcard-title">📅 Perbandingan Bulan Lalu</div>
      <span class="rcard-badge badge-blue">${MONTHS_ID[pm].slice(0,3)} vs ${MONTHS_ID[reportMonth].slice(0,3)}</span>
    </div>
    <div class="mom-row">
      <div class="mom-item">
        <div class="mom-dot green"></div>
        <div class="mom-label">Pemasukan</div>
        <div class="mom-value">${rupiah(prev.income)}</div>
        <span class="mom-delta ${momIncome.cls}">${momIncome.txt}</span>
      </div>
      <div class="mom-item">
        <div class="mom-dot red"></div>
        <div class="mom-label">Pengeluaran</div>
        <div class="mom-value">${rupiah(prev.expense)}</div>
        <span class="mom-delta ${momExpense.cls}">${momExpense.txt}</span>
      </div>
      <div class="mom-item">
        <div class="mom-dot blue"></div>
        <div class="mom-label">Saldo Bersih</div>
        <div class="mom-value">${rupiah(prev.balance)}</div>
        <span class="mom-delta ${momBalance.cls}">${momBalance.txt}</span>
      </div>
      <div class="mom-item">
        <div class="mom-dot" style="background:var(--gold)"></div>
        <div class="mom-label">Jml Transaksi</div>
        <div class="mom-value">${prev.count}</div>
        <span class="mom-delta ${momCount.cls}">${momCount.txt}</span>
      </div>
    </div>
  </div>`;

  document.getElementById('reportContent').innerHTML=html;
}

// ═══════════════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════════════
function renderAll(){
  renderStats(); renderFilters(); renderTxList();
  if(currentPage==='report') renderReport();
}

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
function init(){
  transactions=load();
  const today=new Date();
  reportYear=today.getFullYear(); reportMonth=today.getMonth();

  const todayStr=today.toISOString().split('T')[0];
  document.getElementById('formDate').value=todayStr;
  document.getElementById('sidebarDate').value=todayStr;

  populateCatSelect('formCat','income');
  populateCatSelect('sidebarCat','income');

  if(transactions.length===0){
    const now=new Date();
    const y=now.getFullYear();
    const m=String(now.getMonth()+1).padStart(2,'0');
    const pm2=now.getMonth()===0?12:now.getMonth();
    const py2=now.getMonth()===0?y-1:y;
    const pm2s=String(pm2).padStart(2,'0');
    const demos=[
      {name:'Gaji Bulanan',    type:'income', amount:6500000,category:'Gaji',      date:`${y}-${m}-01`},
      {name:'Freelance Design',type:'income', amount:1800000,category:'Freelance',  date:`${y}-${m}-05`},
      {name:'Makan Siang',     type:'expense',amount:55000,  category:'Makanan',   date:`${y}-${m}-06`},
      {name:'Listrik & Air',   type:'expense',amount:380000, category:'Tagihan',   date:`${y}-${m}-07`},
      {name:'Belanja Bulanan', type:'expense',amount:950000, category:'Belanja',   date:`${y}-${m}-10`},
      {name:'Ojek Online',     type:'expense',amount:42000,  category:'Transport', date:`${y}-${m}-11`},
      {name:'Netflix',         type:'expense',amount:54000,  category:'Hiburan',   date:`${y}-${m}-12`},
      {name:'Obat Apotek',     type:'expense',amount:85000,  category:'Kesehatan', date:`${y}-${m}-14`},
      {name:'Kursus Online',   type:'expense',amount:200000, category:'Pendidikan',date:`${y}-${m}-15`},
      {name:'Gaji Bulanan',    type:'income', amount:6500000,category:'Gaji',      date:`${py2}-${pm2s}-01`},
      {name:'Makan Siang',     type:'expense',amount:48000,  category:'Makanan',   date:`${py2}-${pm2s}-06`},
      {name:'Listrik & Air',   type:'expense',amount:360000, category:'Tagihan',   date:`${py2}-${pm2s}-07`},
      {name:'Belanja Bulanan', type:'expense',amount:820000, category:'Belanja',   date:`${py2}-${pm2s}-10`},
      {name:'Transportasi',    type:'expense',amount:150000, category:'Transport', date:`${py2}-${pm2s}-12`},
      {name:'Investasi Reksadana',type:'income',amount:500000,category:'Investasi',date:`${py2}-${pm2s}-15`},
    ];
    demos.forEach(d=>transactions.push({...d,id:uid(),created:Date.now()}));
    save();
  }
  renderAll();
}

init();
</script>
